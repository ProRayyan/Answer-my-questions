<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranscriptBot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://js.puter.com/v2/"></script>
</head>
<body class="user-page">

    <!-- LOADING SCREEN -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo">
                <i class="fas fa-robot"></i>
            </div>
            <h2>TranscriptBot</h2>
            <p>Loading knowledge base...</p>
            <div class="loading-bar">
                <div class="loading-fill" id="loadingFill"></div>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="user-app" id="userApp" style="display:none">

        <!-- TOP BAR -->
        <div class="user-topbar">
            <div class="topbar-left">
                <div class="bot-avatar">
                    <i class="fas fa-robot"></i>
                    <span class="status-dot"></span>
                </div>
                <div class="bot-info">
                    <h1>TranscriptBot</h1>
                    <span id="topbarStatus">Ready to help</span>
                </div>
            </div>
            <div class="topbar-right">
                <div class="category-pills" id="categoryPills">
                    <!-- Pills rendered here -->
                </div>
                <div class="model-pill">
                    <i class="fas fa-microchip"></i>
                    <select id="modelSelect">
                        <option value="gpt-4o-mini">GPT-4o Mini</option>
                        <option value="gpt-4o" selected>GPT-4o</option>
                        <option value="gpt-4.1">GPT-4.1</option>
                        <option value="claude-3-5-sonnet">Claude 3.5</option>
                        <option value="gemini-2.0-flash">Gemini 2.0</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div class="user-chat" id="userChat">

            <!-- WELCOME -->
            <div class="welcome-block" id="welcomeBlock">
                <div class="welcome-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="welcome-text">
                    <h2>Hi! I'm TranscriptBot 👋</h2>
                    <p>Ask me anything about the video content. I'll find the answer from the transcripts.</p>
                </div>
                <div class="suggestion-chips" id="suggestionChips">
                    <!-- Suggestions added dynamically -->
                </div>
            </div>

            <!-- MESSAGES -->
            <div class="messages-list" id="messagesList"></div>

        </div>

        <!-- INPUT -->
        <div class="user-input-area">
            <div class="input-wrap" id="inputWrap">
                <div class="category-select-row" id="categorySelectRow">
                    <span class="filter-label">
                        <i class="fas fa-filter"></i> Filter:
                    </span>
                    <div class="filter-chips" id="filterChips">
                        <!-- filter chips -->
                    </div>
                </div>
                <div class="input-row">
                    <textarea
                        id="msgInput"
                        placeholder="Ask a question..."
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="input-footer-row">
                    <span class="powered-by">
                        <i class="fas fa-bolt"></i>
                        Powered by Puter.js · Free AI
                    </span>
                    <span class="char-count" id="charCount">0</span>
                </div>
            </div>
        </div>

    </div>

    <!-- NO DATA STATE -->
    <div class="no-data-screen" id="noDataScreen" style="display:none">
        <div class="no-data-content">
            <i class="fas fa-database"></i>
            <h2>No Content Yet</h2>
            <p>The knowledge base is being set up. Please check back soon.</p>
        </div>
    </div>

    <div class="toast-wrap" id="toastWrap"></div>

    <script src="user.js"></script>
</body>
</html>
