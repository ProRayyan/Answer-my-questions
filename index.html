<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranscriptBot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --p:#7c3aed;--p2:#a855f7;--ps:rgba(124,58,237,.10);--pg:rgba(124,58,237,.22);--pt:#c4b5fd;
            --b0:#08080c;--b1:#0e0e14;--b2:#14141c;--b3:#1a1a25;--b4:#21212f;--b5:#2a2a3a;
            --br:rgba(255,255,255,.05);--br2:rgba(255,255,255,.08);--br3:rgba(255,255,255,.12);
            --t1:#f1f5f9;--t2:#c8d0dc;--t3:#6b7a90;--t4:#4a5568;
            --ok:#34d399;--err:#f87171;--warn:#fbbf24
        }
        html,body{height:100%;font-family:'Inter',-apple-system,sans-serif;background:var(--b0);color:var(--t1);overflow:hidden;-webkit-font-smoothing:antialiased}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b5);border-radius:99px}

        .app{display:flex;flex-direction:column;height:100vh}

        /* ═══ TOPBAR ═══ */
        .topbar{
            display:flex;align-items:center;justify-content:space-between;
            padding:12px 28px;background:var(--b1);
            border-bottom:1px solid var(--br2);flex-shrink:0;z-index:20;
        }
        .topbar-l{display:flex;align-items:center;gap:14px}
        .logo{
            width:42px;height:42px;
            background:linear-gradient(135deg,var(--p),var(--p2));
            border-radius:12px;display:flex;align-items:center;justify-content:center;
            font-size:18px;color:#fff;position:relative;flex-shrink:0;
            box-shadow:0 4px 20px rgba(124,58,237,.3);
        }
        .logo .dot{
            position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;
            border-radius:50%;border:2px solid var(--b1);background:var(--warn);
            transition:background .3s;
        }
        .logo .dot.on{background:var(--ok)}
        .brand h1{font-size:16px;font-weight:700;letter-spacing:-.02em}
        .brand p{font-size:11px;color:var(--t3);margin-top:1px}
        .topbar-r{display:flex;align-items:center;gap:8px}
        .mdl{
            display:flex;align-items:center;gap:7px;
            background:var(--b3);border:1px solid var(--br2);
            border-radius:8px;padding:6px 10px;font-size:11px;color:var(--t3);
        }
        .mdl i{color:var(--p);font-size:12px}
        .mdl select{background:transparent;border:none;color:var(--t2);font-size:11px;font-family:inherit;outline:none;cursor:pointer}
        .mdl select option{background:var(--b3);color:var(--t1)}

        /* ═══ FILTERS ═══ */
        .filters{
            flex-shrink:0;padding:16px 28px;
            background:var(--b1);border-bottom:1px solid var(--br);
            display:flex;gap:16px;z-index:15;
        }
        .fcard{
            flex:1;min-width:0;
            background:var(--b2);border:1px solid var(--br2);
            border-radius:12px;padding:14px 16px;
            display:flex;flex-direction:column;gap:10px;
            transition:border-color .2s,box-shadow .2s;
        }
        .fcard:hover{border-color:var(--br3)}
        .fcard-h{
            display:flex;align-items:center;gap:8px;
            font-size:11px;font-weight:700;color:var(--t3);
            text-transform:uppercase;letter-spacing:.08em;
        }
        .fcard-h .ico{
            width:26px;height:26px;
            background:linear-gradient(135deg,var(--p),var(--p2));
            border-radius:7px;display:flex;align-items:center;justify-content:center;
            font-size:11px;color:#fff;
        }
        .fcard-b{display:flex;flex-wrap:wrap;gap:6px}
        .fb{
            padding:5px 13px;border-radius:8px;font-size:11px;font-weight:500;
            cursor:pointer;background:var(--b3);color:var(--t3);
            border:1px solid var(--br);transition:all .15s;
            display:flex;align-items:center;gap:5px;user-select:none;
        }
        .fb:hover{background:var(--b4);color:var(--t2);border-color:var(--br2)}
        .fb.on{
            background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(168,85,247,.10));
            color:var(--pt);border-color:var(--pg);
            box-shadow:0 2px 8px rgba(124,58,237,.12);
        }
        .fb .n{
            font-size:9px;font-weight:700;
            background:rgba(255,255,255,.06);padding:1px 5px;border-radius:99px;
        }
        .fb.on .n{background:var(--pg);color:var(--pt)}
        .fcard-empty{font-size:11px;color:var(--t4);font-style:italic;padding:2px 0}

        /* ═══ CHAT ═══ */
        .chat{flex:1;overflow-y:auto;scroll-behavior:smooth}

        /* WELCOME */
        .wel{
            display:flex;flex-direction:column;align-items:center;text-align:center;
            gap:18px;padding:48px 24px 32px;max-width:560px;margin:0 auto;
        }
        .wel-ico{
            width:76px;height:76px;
            background:linear-gradient(135deg,var(--p),var(--p2));
            border-radius:22px;display:flex;align-items:center;justify-content:center;
            font-size:32px;color:#fff;
            box-shadow:0 8px 36px rgba(124,58,237,.35);
            animation:fl 3s ease-in-out infinite;
        }
        @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        .wel h2{font-size:24px;font-weight:800;letter-spacing:-.02em}
        .wel p{font-size:14px;color:var(--t3);line-height:1.7}
        .chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:6px}
        .chip{
            padding:9px 18px;background:var(--b2);border:1px solid var(--br2);
            border-radius:99px;font-size:12px;color:var(--t2);cursor:pointer;
            transition:all .2s;
        }
        .chip:hover{
            background:var(--ps);border-color:var(--pg);color:var(--pt);
            transform:translateY(-2px);box-shadow:0 4px 14px rgba(124,58,237,.12);
        }

        /* MESSAGES */
        .msgs{display:flex;flex-direction:column;gap:4px;max-width:740px;margin:0 auto;padding:0 24px 24px;width:100%}
        .m{display:flex;gap:10px;animation:ms .3s cubic-bezier(.16,1,.3,1)}
        @keyframes ms{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .m.u{flex-direction:row-reverse;padding-left:44px}
        .m.b{padding-right:44px}
        .m-av{
            width:32px;height:32px;border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            font-size:13px;flex-shrink:0;margin-top:3px;
        }
        .m.u .m-av{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff}
        .m.b .m-av{background:var(--b3);border:1px solid var(--br2);color:var(--pt)}
        .m-bd{display:flex;flex-direction:column;gap:5px;min-width:0}
        .m-bb{padding:12px 16px;font-size:13px;line-height:1.75;word-break:break-word}
        .m.u .m-bb{
            background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;
            border-radius:18px 4px 18px 18px;
            box-shadow:0 3px 14px rgba(124,58,237,.2);
        }
        .m.b .m-bb{
            background:var(--b2);color:var(--t2);
            border:1px solid var(--br);border-radius:4px 18px 18px 18px;
        }
        .m.b .m-bb strong{color:var(--pt)}
        .m.b .m-bb code{background:var(--b4);padding:1px 5px;border-radius:4px;font-size:11px;color:var(--pt);font-family:monospace}
        .m-ft{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--t4);padding:0 4px;flex-wrap:wrap}
        .m.u .m-ft{justify-content:flex-end}
        .src{font-size:9px;background:var(--ps);color:var(--pt);padding:2px 8px;border-radius:99px;border:1px solid var(--pg)}
        .dots{display:flex;gap:4px;align-items:center;padding:3px 0}
        .dots span{width:7px;height:7px;background:var(--p);border-radius:50%;animation:db 1.4s infinite ease-in-out;opacity:.4}
        .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
        @keyframes db{0%,80%,100%{transform:scale(1);opacity:.3}40%{transform:scale(1.3);opacity:1}}
        .stm::after{content:'';animation:bl .7s infinite;color:var(--p);margin-left:2px}
        @keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

        /* ═══ INPUT ═══ */
        .inp-area{flex-shrink:0;padding:0 28px 20px;z-index:10}
        .inp-box{
            max-width:740px;margin:0 auto;
            background:var(--b2);border:1.5px solid var(--br2);
            border-radius:14px;overflow:hidden;
            transition:border-color .2s,box-shadow .2s;
        }
        .inp-box:focus-within{
            border-color:var(--pg);
            box-shadow:0 0 0 3px rgba(124,58,237,.06),0 6px 24px rgba(0,0,0,.15);
        }
        .inp-row{display:flex;align-items:flex-end;gap:10px;padding:12px 14px}
        .inp-row textarea{
            flex:1;background:transparent;border:none;outline:none;
            color:var(--t1);font-size:14px;resize:none;max-height:130px;
            line-height:1.5;font-family:inherit;min-height:22px;
        }
        .inp-row textarea::placeholder{color:var(--t4)}
        .inp-row textarea:disabled{opacity:.35}
        .snd{
            width:38px;height:38px;
            background:linear-gradient(135deg,var(--p),var(--p2));
            border:none;border-radius:10px;color:#fff;font-size:14px;
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            flex-shrink:0;transition:all .2s;
            box-shadow:0 3px 14px rgba(124,58,237,.3);
        }
        .snd:hover:not(:disabled){transform:translateY(-1px) scale(1.04);box-shadow:0 5px 20px rgba(124,58,237,.4)}
        .snd:active:not(:disabled){transform:scale(.94)}
        .snd:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none}
        .inp-ft{
            display:flex;justify-content:space-between;align-items:center;
            padding:5px 14px 10px;font-size:10px;color:var(--t4);
        }
        .tags{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
        .tag{
            background:var(--ps);color:var(--pt);padding:2px 9px;
            border-radius:99px;font-size:9px;border:1px solid var(--pg);
            display:inline-flex;align-items:center;gap:4px;font-weight:600;
        }
        .tag i{font-size:8px}

        /* ═══ TOAST ═══ */
        .tbox{position:fixed;bottom:18px;right:18px;z-index:99999;display:flex;flex-direction:column;gap:7px}
        .toast{
            display:flex;align-items:center;gap:9px;padding:12px 16px;
            background:var(--b2);border:1px solid var(--br2);border-radius:10px;
            font-size:12px;max-width:300px;
            box-shadow:0 10px 36px rgba(0,0,0,.4);
            animation:ti .3s cubic-bezier(.16,1,.3,1);
        }
        @keyframes ti{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
        .toast.success{border-left:3px solid var(--ok)}
        .toast.error{border-left:3px solid var(--err)}
        .toast.warning{border-left:3px solid var(--warn)}
        .toast.info{border-left:3px solid #60a5fa}

        /* ═══ RESPONSIVE ═══ */
        @media(max-width:700px){
            .topbar{padding:10px 14px}
            .filters{padding:12px 14px;flex-direction:column;gap:10px}
            .fcard{min-width:auto}
            .msgs{padding:0 12px 16px}
            .m.u{padding-left:16px}.m.b{padding-right:16px}
            .inp-area{padding:0 12px 14px}
            .wel{padding:28px 14px 20px}
            .wel-ico{width:60px;height:60px;font-size:26px;border-radius:18px}
            .wel h2{font-size:20px}
        }
    </style>
</head>
<body>
<div class="app">

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-l">
            <div class="logo"><i class="fas fa-robot"></i><div class="dot" id="dot"></div></div>
            <div class="brand"><h1 id="botTitle">TranscriptBot</h1><p id="statusText">Starting...</p></div>
        </div>
        <div class="topbar-r">
            <div class="mdl"><i class="fas fa-microchip"></i>
                <select id="modelPicker">
                    <option value="gpt-4o-mini" selected>GPT-4o Mini</option>
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="claude-3-5-sonnet">Claude 3.5</option>
                    <option value="gemini-2.0-flash">Gemini 2.0</option>
                </select>
            </div>
        </div>
    </div>

    <!-- FILTER CARDS -->
    <div class="filters" id="filters">
        <div class="fcard">
            <div class="fcard-h"><div class="ico"><i class="fas fa-folder"></i></div> Select Category</div>
            <div class="fcard-b" id="catBtns"></div>
        </div>
        <div class="fcard" id="vidCard" style="display:none">
            <div class="fcard-h"><div class="ico"><i class="fas fa-play-circle"></i></div> Select Video</div>
            <div class="fcard-b" id="vidBtns"></div>
        </div>
    </div>

    <!-- CHAT -->
    <div class="chat" id="chat">
        <div class="wel" id="wel">
            <div class="wel-ico"><i class="fas fa-robot"></i></div>
            <h2 id="welH">Hi! I'm TranscriptBot</h2>
            <p id="welP">Ask me anything about the video content.</p>
            <div class="chips" id="chips"></div>
        </div>
        <div class="msgs" id="msgs"></div>
    </div>

    <!-- INPUT -->
    <div class="inp-area">
        <div class="inp-box">
            <div class="inp-row">
                <textarea id="inp" placeholder="Loading..." rows="1" disabled></textarea>
                <button class="snd" id="snd" disabled><i class="fas fa-paper-plane"></i></button>
            </div>
            <div class="inp-ft">
                <div class="tags" id="tags"></div>
                <span id="stat"><i class="fas fa-spinner fa-spin"></i> Connecting...</span>
            </div>
        </div>
    </div>
</div>

<div class="tbox" id="tbox"></div>

<script src="https://js.puter.com/v2/"></script>
<script>
(function(){
"use strict";

var S={data:null,set:{},cat:"all",vid:"all",hist:[],busy:false,rdy:false};
function $(id){return document.getElementById(id)}
var D={
    dot:$("dot"),title:$("botTitle"),status:$("statusText"),
    catBtns:$("catBtns"),vidBtns:$("vidBtns"),vidCard:$("vidCard"),
    filters:$("filters"),tags:$("tags"),model:$("modelPicker"),
    chat:$("chat"),wel:$("wel"),welH:$("welH"),welP:$("welP"),
    chips:$("chips"),msgs:$("msgs"),
    inp:$("inp"),snd:$("snd"),stat:$("stat"),tbox:$("tbox")
};

function toast(m,t){
    t=t||"info";
    var ic={success:"fa-check-circle",error:"fa-times-circle",warning:"fa-exclamation-triangle",info:"fa-info-circle"};
    var d=document.createElement("div");d.className="toast "+t;
    d.innerHTML='<i class="fas '+(ic[t]||ic.info)+'"></i> '+m;
    D.tbox.appendChild(d);
    setTimeout(function(){d.style.opacity="0";d.style.transition=".3s";setTimeout(function(){d.remove()},300)},3000);
}
function fc(c){return c.replace(/_/g," ").replace(/\b\w/g,function(x){return x.toUpperCase()})}
function tm(){return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
function sd(){D.chat.scrollTop=D.chat.scrollHeight}
function fm(t){
    return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\*(.*?)\*/g,"<em>$1</em>")
        .replace(/`([^`]+)`/g,"<code>$1</code>").replace(/\n/g,"<br>");
}
function online(y){D.dot.className=y?"dot on":"dot"}
function enable(){D.inp.disabled=false;D.snd.disabled=false;D.inp.placeholder="Ask anything about the transcripts..."}
function disable(m){D.inp.disabled=true;D.snd.disabled=true;D.inp.placeholder=m||"Please wait..."}
function sl(ms){return new Promise(function(r){setTimeout(r,ms)})}

// DATA
function ldLocal(){
    try{var r=localStorage.getItem("tb_export")||localStorage.getItem("tb_admin_db");if(!r)return null;var d=JSON.parse(r);if(d&&d.categories&&Object.keys(d.categories).length>0)return d;return null}catch(e){return null}
}
function ldUrl(u){
    return fetch(u+"?t="+Date.now(),{cache:"no-cache"}).then(function(r){return r.ok?r.json():null}).then(function(d){if(d&&d.categories&&Object.keys(d.categories).length>0)return d;return null}).catch(function(){return null})
}
async function ldData(){
    var d=ldLocal();if(d)return d;
    var u=localStorage.getItem("tb_raw_url");if(u){d=await ldUrl(u);if(d)return d}
    d=await ldUrl("./data/transcripts.json");return d;
}
async function waitAI(mx){mx=mx||12000;var t=0;while(t<mx){if(typeof puter!=="undefined"&&puter.ai&&typeof puter.ai.chat==="function")return true;await sl(250);t+=250}return false}

// FILTERS
function buildCats(){
    D.catBtns.innerHTML="";
    var cats=Object.keys(S.data.categories);
    mkBtn("all","All Categories",cntAll(),D.catBtns,function(){S.cat="all";S.vid="all";setOn(D.catBtns,"all");buildVids();updTags()});
    cats.forEach(function(c){
        var n=S.data.categories[c].length;
        mkBtn(c,fc(c),n,D.catBtns,function(){S.cat=c;S.vid="all";setOn(D.catBtns,c);buildVids();updTags()});
    });
    setOn(D.catBtns,"all");buildVids();
}

function buildVids(){
    D.vidBtns.innerHTML="";
    var files=filesFor(S.cat);
    if(files.length<=1){D.vidCard.style.display="none";return}
    D.vidCard.style.display="block";
    mkBtn("all","All Videos",files.length,D.vidBtns,function(){S.vid="all";setOn(D.vidBtns,"all");updTags()});
    files.forEach(function(f){
        var nm=f.name.replace(/\.(txt|pdf)$/i,"").replace(/_/g," ");
        var cn=f.chunks?f.chunks.length:0;
        mkBtn(f.name,nm,cn,D.vidBtns,function(){S.vid=f.name;setOn(D.vidBtns,f.name);updTags()});
    });
    setOn(D.vidBtns,"all");
}

function mkBtn(id,label,count,box,fn){
    var d=document.createElement("div");d.className="fb";d.setAttribute("data-id",id);
    d.innerHTML=label+'<span class="n">'+count+'</span>';
    d.addEventListener("click",fn);box.appendChild(d);
}
function setOn(box,id){
    var bs=box.querySelectorAll(".fb");
    for(var i=0;i<bs.length;i++)bs[i].classList.toggle("on",bs[i].getAttribute("data-id")===id);
}
function filesFor(c){
    if(c==="all"){var a=[];var k=Object.keys(S.data.categories);for(var i=0;i<k.length;i++){var f=S.data.categories[k[i]];for(var j=0;j<f.length;j++)a.push(f[j])}return a}
    return S.data.categories[c]||[];
}
function cntAll(){var n=0;var k=Object.keys(S.data.categories);for(var i=0;i<k.length;i++)n+=S.data.categories[k[i]].length;return n}

function updTags(){
    var h="";
    if(S.cat!=="all")h+='<span class="tag"><i class="fas fa-folder"></i>'+fc(S.cat)+'</span>';
    if(S.vid!=="all"){var nm=S.vid.replace(/\.(txt|pdf)$/i,"").replace(/_/g," ");h+='<span class="tag"><i class="fas fa-play-circle"></i>'+nm+'</span>'}
    if(!h)h='<span style="font-size:10px;color:var(--t4)"><i class="fas fa-globe" style="margin-right:3px"></i>All transcripts</span>';
    D.tags.innerHTML=h;
}

// SUGGESTIONS
function buildChips(){
    D.chips.innerHTML="";
    var sg=(S.set.suggestions&&S.set.suggestions.length)?S.set.suggestions:["What topics are covered?","Summarize the main points","What are the key takeaways?","Explain this simply"];
    sg.slice(0,4).forEach(function(s){var c=document.createElement("div");c.className="chip";c.textContent=s;c.addEventListener("click",function(){D.inp.value=s;send()});D.chips.appendChild(c)});
}
function applySets(){
    var s=S.set;
    if(s.botName){D.title.textContent=s.botName;document.title=s.botName}
    if(s.welcome)D.welP.textContent=s.welcome;
    if(s.defaultModel){var o=D.model.querySelector('option[value="'+s.defaultModel+'"]');if(o)o.selected=true}
}

// SEARCH
function tok(t){return String(t).toLowerCase().replace(/[^a-z0-9\s]/g," ").split(/\s+/).filter(function(w){return w.length>1})}
function sc(chunk,q){
    var ct=tok(chunk);var qt=tok(q);var cs=new Set(ct);var s=0;
    if(chunk.toLowerCase().indexOf(q.toLowerCase())!==-1)s+=20;
    qt.forEach(function(w){if(cs.has(w))s+=4;ct.forEach(function(c){if(c.length>2&&w.length>2&&(c.indexOf(w)!==-1||w.indexOf(c)!==-1))s+=1})});
    if(ct.length>20&&ct.length<400)s+=2;return s;
}
function sPrimary(q){
    var tk=Math.max(parseInt(S.set.topK)||5,8);
    var cats=S.cat==="all"?Object.keys(S.data.categories):[S.cat];var r=[];
    cats.forEach(function(c){var fs=S.data.categories[c]||[];fs.forEach(function(f){if(S.vid!=="all"&&f.name!==S.vid)return;(f.chunks||[]).forEach(function(ch){var s=sc(ch,q);if(s>0)r.push({chunk:ch,score:s,cat:c,file:f.name})})})});
    r.sort(function(a,b){return b.score-a.score});return r.slice(0,tk);
}
function sBroad(q){
    var cats=S.cat==="all"?Object.keys(S.data.categories):[S.cat];var r=[];var qw=tok(q);
    cats.forEach(function(c){var fs=S.data.categories[c]||[];fs.forEach(function(f){if(S.vid!=="all"&&f.name!==S.vid)return;var ch=f.chunks||[];if(ch.length>0)r.push({chunk:ch[0],score:.5,cat:c,file:f.name});ch.forEach(function(ck){var cl=ck.toLowerCase();var ok=false;qw.forEach(function(w){if(cl.indexOf(w)!==-1)ok=true});if(ok)r.push({chunk:ck,score:1,cat:c,file:f.name})})})});
    return r.slice(0,6);
}
function merge(a,b){var seen={};var m=[];a.concat(b).forEach(function(i){var k=i.chunk.slice(0,80);if(!seen[k]){seen[k]=true;m.push(i)}});return m.slice(0,12)}
function ctx(chunks){
    if(chunks.length===0){
        var all=[];var cats=S.cat==="all"?Object.keys(S.data.categories):[S.cat];
        cats.forEach(function(c){var fs=S.data.categories[c]||[];fs.forEach(function(f){if(S.vid!=="all"&&f.name!==S.vid)return;var p=(f.chunks||[]).slice(0,3).join(" ");all.push("["+fc(c)+" / "+f.name.replace(/\.(txt|pdf)$/i,"")+"]\n"+p)})});
        return all.join("\n\n---\n\n")||"No content.";
    }
    return chunks.map(function(r){return "["+fc(r.cat)+" / "+r.file.replace(/\.(txt|pdf)$/i,"")+"]\n"+r.chunk}).join("\n\n---\n\n");
}

// MESSAGES
function addM(role,content,streaming){
    D.wel.style.display="none";
    var w=document.createElement("div");w.className="m "+(role==="user"?"u":"b");
    var ic=role==="user"?"fa-user":"fa-robot";
    if(streaming){
        w.innerHTML='<div class="m-av"><i class="fas '+ic+'"></i></div><div class="m-bd"><div class="m-bb stm"><div class="dots"><span></span><span></span><span></span></div></div><div class="m-ft"><span>'+tm()+'</span></div></div>';
    }else{
        w.innerHTML='<div class="m-av"><i class="fas '+ic+'"></i></div><div class="m-bd"><div class="m-bb">'+fm(content)+'</div><div class="m-ft"><span>'+tm()+'</span></div></div>';
    }
    D.msgs.appendChild(w);sd();return w;
}

// SEND
async function send(){
    var t=D.inp.value.trim();if(!t||S.busy)return;
    if(typeof puter==="undefined"||!puter.ai){toast("AI not ready","warning");return}
    if(!S.data){toast("No data","error");return}
    S.busy=true;D.snd.disabled=true;D.inp.value="";D.inp.style.height="auto";
    addM("user",t);S.hist.push({role:"user",content:t});
    var p=sPrimary(t);var b=sBroad(t);var all=merge(p,b);var c=ctx(all);

    var sys="You are an expert AI assistant with full access to video transcript content.\n\n"
        +"YOUR MISSION: Answer the user's question as COMPLETELY and HELPFULLY as possible.\n\n"
        +"HOW TO ANSWER:\n"
        +"- Read ALL transcript content below carefully\n"
        +"- Answer from ANY angle - direct, indirect, summary, comparison, explanation, examples, definitions\n"
        +"- If the exact phrase is not there but the concept is covered - STILL ANSWER\n"
        +"- Combine information from multiple sections for complete answers\n"
        +"- If asked to summarize - summarize everything from the transcripts\n"
        +"- If asked to explain simply - break it down clearly\n"
        +"- If asked for examples - find or create relevant ones based on transcript topics\n"
        +"- If asked for pros/cons, comparisons, lists - extract and organize from transcript\n"
        +"- If asked a follow-up - use transcript AND conversation history\n"
        +"- If topic genuinely not covered - say what IS covered and offer help\n"
        +"- NEVER refuse a reasonable question\n"
        +"- NEVER say 'I cannot find this' unless absolutely nothing is related\n"
        +"- Be thorough, friendly, detailed\n"
        +"- Use bullet points, numbered lists, bold text for clarity\n\n"
        +"TRANSCRIPTS:\n==================\n"+c+"\n==================\n\n"
        +"Answer thoroughly using all context above.";

    var msgs=[{role:"system",content:sys}];
    var h=S.hist.slice(-12);for(var i=0;i<h.length;i++)msgs.push(h[i]);

    var model=D.model.value||"gpt-4o-mini";
    var el=addM("bot","",true);var bb=el.querySelector(".m-bb");var ft=el.querySelector(".m-ft");var full="";

    try{
        var stream=await puter.ai.chat(msgs,{model:model,stream:true});
        bb.innerHTML="";bb.classList.add("stm");
        for await(var part of stream){var tk=(part&&part.text)?part.text:"";full+=tk;bb.innerHTML=fm(full);sd()}
        bb.classList.remove("stm");
        if(all.length>0){var seen={};all.slice(0,4).forEach(function(c){var k=fc(c.cat)+" > "+c.file.replace(/\.(txt|pdf)$/i,"");if(!seen[k]){seen[k]=true;var tg=document.createElement("span");tg.className="src";tg.textContent="\uD83D\uDCC4 "+k;ft.appendChild(tg)}})}
        S.hist.push({role:"assistant",content:full});
    }catch(err){
        bb.classList.remove("stm");console.error(err);
        bb.innerHTML='<span style="color:var(--err)">\u26A0 '+(err.message||"Error")+'</span>';
    }
    S.busy=false;D.snd.disabled=false;D.inp.focus();
}

// EVENTS
D.snd.addEventListener("click",send);
D.inp.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}});
D.inp.addEventListener("input",function(){D.inp.style.height="auto";D.inp.style.height=Math.min(D.inp.scrollHeight,130)+"px"});

// BOOT
async function boot(){
    D.status.textContent="Loading...";D.stat.innerHTML='<i class="fas fa-spinner fa-spin"></i> Loading...';
    var data=await ldData();
    if(!data){
        D.status.textContent="No data";D.stat.innerHTML='<i class="fas fa-exclamation-circle" style="color:var(--warn)"></i> No data';
        disable("No transcripts yet");D.welH.textContent="No Content Yet";D.welP.textContent="Admin hasn't uploaded transcripts yet.";
        D.chips.style.display="none";D.filters.style.display="none";return;
    }
    S.data=data;S.set=data.settings||{};
    var tf=cntAll();var tc=Object.keys(data.categories).length;
    D.status.textContent=tf+" files \u00B7 "+tc+" categories";
    applySets();buildCats();buildChips();updTags();
    D.stat.innerHTML='<i class="fas fa-spinner fa-spin"></i> Connecting...';
    waitAI(15000).then(function(){S.rdy=true;enable();online(true);D.stat.innerHTML='<i class="fas fa-circle" style="color:var(--ok);font-size:7px"></i> Ready'});
    setTimeout(function(){if(!S.rdy){S.rdy=true;enable();online(true);D.stat.innerHTML='<i class="fas fa-circle" style="color:var(--ok);font-size:7px"></i> Ready'}},3000);
}
boot();
})();
</script>
