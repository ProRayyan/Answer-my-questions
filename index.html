<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranscriptBot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="user-page">

    <!-- MAIN APP - shown by default now -->
    <div class="user-app" id="userApp">

        <!-- TOP BAR -->
        <div class="user-topbar">
            <div class="topbar-left">
                <div class="bot-avatar">
                    <i class="fas fa-robot"></i>
                    <span class="status-dot" id="statusDot"></span>
                </div>
                <div class="bot-info">
                    <h1 id="botName">TranscriptBot</h1>
                    <span id="topbarStatus">Initializing...</span>
                </div>
            </div>
            <div class="topbar-right">
                <div class="category-pills" id="categoryPills"></div>
                <div class="model-pill">
                    <i class="fas fa-microchip"></i>
                    <select id="modelSelect">
                        <option value="gpt-4o-mini" selected>GPT-4o Mini</option>
                        <option value="gpt-4o">GPT-4o</option>
                        <option value="gpt-4.1">GPT-4.1</option>
                        <option value="claude-3-5-sonnet">Claude 3.5</option>
                        <option value="gemini-2.0-flash">Gemini 2.0</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div class="user-chat" id="userChat">

            <!-- WELCOME shown until first message -->
            <div class="welcome-block" id="welcomeBlock">
                <div class="welcome-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="welcome-text">
                    <h2 id="welcomeTitle">Hi! I'm TranscriptBot 👋</h2>
                    <p id="welcomeSubtitle">Ask me anything about the video content.</p>
                </div>
                <div class="suggestion-chips" id="suggestionChips"></div>
            </div>

            <div class="messages-list" id="messagesList"></div>
        </div>

        <!-- INPUT -->
        <div class="user-input-area">
            <div class="input-wrap" id="inputWrap">
                <div class="category-select-row" id="categorySelectRow" style="display:none">
                    <span class="filter-label">
                        <i class="fas fa-filter"></i> Topic:
                    </span>
                    <div class="filter-chips" id="filterChips"></div>
                </div>
                <div class="input-row">
                    <textarea
                        id="msgInput"
                        placeholder="Ask a question..."
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" disabled>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="input-footer-row">
                    <span id="statusLabel" style="font-size:11px;color:var(--text-3)">
                        <i class="fas fa-spinner fa-spin"></i> Loading...
                    </span>
                    <span class="char-count" id="charCount"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-wrap" id="toastWrap"></div>

    <!-- Load puter AFTER page renders -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="user.js"></script>
</body>
</html>
